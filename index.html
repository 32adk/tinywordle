<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle 游戏</title>
    <style>
        :root {
            --tile-size: min(60px, calc(20vw - 12px));
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            color: #1a1a1b;
            margin: 0;
            padding: 10px;
        }
        
        #header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #d3d6da;
            padding-bottom: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        select {
            border: 2px solid #d3d6da;
            background-color: white;
            color: #1a1a1b;
            padding: 8px 4px;
        }
        
        /* 提示按钮样式 */
        #hint-btn {
            background-color: #c9b458;
            color: white;
            border: none;
            transition: background-color 0.2s, opacity 0.2s;
        }
        #hint-btn:hover:not(:disabled) {
            background-color: #b5a24f;
        }
        #hint-btn:disabled {
            background-color: #d3d6da;
            cursor: not-allowed;
            opacity: 0.8;
        }

        #restart-btn {
            background-color: #787c7e;
            color: white;
            border: none;
            transition: background-color 0.2s;
        }
        #restart-btn:hover {
            background-color: #565758;
        }

        #message {
            min-height: 20px;
            height: auto;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d71111;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
            word-break: break-word;
        }
        
        #board-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .tile {
            width: var(--tile-size);
            height: var(--tile-size);
            border: 2px solid #d3d6da;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .filled {
            border-color: #878a8c;
        }

        #keyboard {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .key {
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            border: 0;
            padding: 0;
            height: 58px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            background-color: #d3d6da;
            color: #1a1a1b;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            transition: background-color 0.1s;
        }
        .key:active {
            transform: scale(0.95);
        }
        .key.wide {
            flex: 1.5;
            font-size: 1rem;
        }

        .correct { background-color: #6aaa64 !important; color: white !important; border-color: #6aaa64 !important; }
        .present { background-color: #c9b458 !important; color: white !important; border-color: #c9b458 !important; }
        .absent { background-color: #787c7e !important; color: white !important; border-color: #787c7e !important; }
    </style>
</head>
<body>

    <div id="header-container">
        <h1>WORDLE</h1>
        <div class="controls">
            <select id="mode-select" onchange="changeMode(this.value)">
                <option value="3">3 字母</option>
                <option value="4">4 字母</option>
                <option value="5" selected>5 字母</option>
                <option value="6">6 字母</option>
                <option value="7">7 字母</option>
            </select>
            <!-- 新增的提示按钮 -->
            <button id="hint-btn" onclick="useHint()">提示</button>
            <button id="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>
    
    <div id="message">正在加载词库...</div>
    
    <div id="board-wrapper">
        <div id="board"></div>
    </div>
    
    <div id="keyboard"></div>

    <script>
        const ROW_COUNT = 6;
        let COL_COUNT = 5; 
        
        let wordListData = []; 
        let dictionary = [];   
        let currentTarget = null; 
        
        let currentRow = 0;
        let currentCol = 0;
        let isGameOver = false;

        // 提示功能的状态变量
        let hintUsed = false;
        let discoveredLetters = new Set(); // 记录已经被发现的正确/存在的字母

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");
        const hintBtn = document.getElementById("hint-btn");

        const keyboardRows = [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['Enter', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'Backspace']
        ];

        function initBoard() {
            board.innerHTML = ""; 
            for (let r = 0; r < ROW_COUNT; r++) {
                let row = document.createElement("div");
                row.className = "row";
                row.id = `row-${r}`;
                
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keyboard.innerHTML = ""; 
            keyboardRows.forEach(row => {
                let rowEl = document.createElement("div");
                rowEl.className = "keyboard-row";
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.className = "key";
                    button.id = `key-${key}`;
                    
                    if (key === "Enter") {
                        button.innerText = "ENTER";
                        button.classList.add("wide");
                    } else if (key === "Backspace") {
                        button.innerText = "⌫";
                        button.classList.add("wide");
                    } else {
                        button.innerText = key;
                    }

                    button.addEventListener("click", () => handleVirtualKeyClick(key));
                    rowEl.appendChild(button);
                });
                keyboard.appendChild(rowEl);
            });
        }

        // 修改：加入了颜色参数，用于区分报错（红）和提示（黄）
        function showMessage(msg, duration = 2000, color = "#d71111") {
            messageEl.innerText = msg;
            messageEl.style.color = color;
            if (duration > 0) {
                setTimeout(() => {
                    if (messageEl.innerText === msg) messageEl.innerText = "";
                }, duration);
            }
        }

        function changeMode(modeStr) {
            COL_COUNT = parseInt(modeStr);
            loadDictionary(); 
        }

        function restartGame() {
            if (wordListData.length === 0) return;

            currentRow = 0;
            currentCol = 0;
            isGameOver = false;

            // 重置提示功能
            hintUsed = false;
            discoveredLetters.clear();
            hintBtn.disabled = false;
            hintBtn.innerText = "提示";

            currentTarget = wordListData[Math.floor(Math.random() * wordListData.length)];

            console.log(`${COL_COUNT}字母模式，新答案是:`, currentTarget.original);

            messageEl.innerText = "";

            for (let r = 0; r < ROW_COUNT; r++) {
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.getElementById(`tile-${r}-${c}`);
                    tile.innerText = "";
                    tile.className = "tile"; 
                }
            }

            const keys = document.querySelectorAll(".key");
            keys.forEach(key => {
                key.classList.remove("correct", "present", "absent");
            });
        }

        // --- 新增：使用提示功能 ---
        function useHint() {
            if (isGameOver || hintUsed || !currentTarget) return;

            // 获取目标单词中所有不重复的字母
            let targetLetters = new Set(currentTarget.lower.split(''));
            
            // 筛选出还没有被发现的字母
            let undiscovered = [...targetLetters].filter(l => !discoveredLetters.has(l));

            if (undiscovered.length === 0) {
                // 如果所有字母都被发现了，不消耗提示次数
                showMessage("目标单词的所有字母都已被发现！", 2000, "#c9b458");
                return; 
            }

            // 随机挑选一个未发现的字母
            let hintLetter = undiscovered[Math.floor(Math.random() * undiscovered.length)];

            // 标记为已使用
            hintUsed = true;
            hintBtn.disabled = true;
            hintBtn.innerText = "已提示";

            // 在虚拟键盘上将该字母点亮为黄色
            updateKeyboardStatus(hintLetter, 'present');

            showMessage(`💡 提示：目标单词包含字母 [ ${hintLetter.toUpperCase()} ]`, 4000, "#c9b458");
        }

        function handleVirtualKeyClick(key) {
            if (isGameOver) return;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else addLetter(key);
        }

        function handlePhysicalInput(e) {
            if (isGameOver) return;
            const key = e.key;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else if (/^[a-zA-Z]$/.test(key)) addLetter(key.toLowerCase());
        }

        function addLetter(letter) {
            if (currentCol < COL_COUNT) {
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = letter;
                tile.classList.add("filled");
                currentCol++;
            }
        }

        function deleteLetter() {
            if (currentCol > 0) {
                currentCol--;
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = "";
                tile.classList.remove("filled");
            }
        }

        function updateKeyboardStatus(letter, status) {
            const keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;

            if (keyBtn.classList.contains('correct')) return;
            if (keyBtn.classList.contains('present') && status === 'absent') return;

            keyBtn.classList.remove('absent', 'present', 'correct');
            keyBtn.classList.add(status);
        }

        function submitGuess() {
            if (currentCol !== COL_COUNT) {
                showMessage("字母数量不足");
                return;
            }

            let guess = "";
            for (let c = 0; c < COL_COUNT; c++) {
                guess += document.getElementById(`tile-${currentRow}-${c}`).innerText.toLowerCase();
            }

            if (!dictionary.includes(guess)) {
                showMessage("不在单词列表中");
                return;
            }

            let targetLetterCount = {};
            for (let i = 0; i < COL_COUNT; i++) {
                let letter = currentTarget.lower[i];
                targetLetterCount[letter] = (targetLetterCount[letter] || 0) + 1;
            }

            let tileStatuses = new Array(COL_COUNT).fill("absent");

            for (let i = 0; i < COL_COUNT; i++) {
                if (guess[i] === currentTarget.lower[i]) {
                    tileStatuses[i] = "correct";
                    targetLetterCount[guess[i]] -= 1;
                }
            }

            for (let i = 0; i < COL_COUNT; i++) {
                if (tileStatuses[i] === "absent" && targetLetterCount[guess[i]] > 0) {
                    tileStatuses[i] = "present";
                    targetLetterCount[guess[i]] -= 1;
                }
            }

            for (let i = 0; i < COL_COUNT; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                let letter = guess[i];
                let status = tileStatuses[i];
                
                // 记录已被发现的正确字母，以供提示系统使用
                if (status === "correct" || status === "present") {
                    discoveredLetters.add(letter);
                }

                tile.classList.add(status);
                updateKeyboardStatus(letter, status); 
            }

            const answerDisplay = currentTarget.def 
                ? `${currentTarget.original}\n${currentTarget.def}`
                : `${currentTarget.original}`;

            if (guess === currentTarget.lower) {
                showMessage(`恭喜你，猜对了！\n${answerDisplay}`, 0, "#6aaa64");
                isGameOver = true;
                return;
            }

            currentRow++;
            currentCol = 0;

            if (currentRow === ROW_COUNT) {
                showMessage(`游戏结束！答案是:\n${answerDisplay}`, 0);
                isGameOver = true;
            }
        }
