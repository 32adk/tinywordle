<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle 游戏</title>
    <style>
        :root {
            --col-count: 5;
            --tile-size: min(60px, calc((100vw - 50px) / var(--col-count)));
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            color: #1a1a1b;
            margin: 0;
            padding: 10px;
        }
        
        /* 教程弹窗样式 */
        #tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #tutorial-modal {
            background-color: white;
            padding: 20px 30px;
            border-radius: 8px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        #tutorial-modal h2 {
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid #d3d6da;
            padding-bottom: 10px;
        }
        .tutorial-example {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .tutorial-tile {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }
        #start-game-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #6aaa64;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            position: relative;
            z-index: 10000;
        }
        #start-game-btn:active {
            background-color: #5c9656;
        }
        
        /* 主界面样式 */
        #header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #d3d6da;
            padding-bottom: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        h1 { margin: 0; font-size: 2rem; }
        .controls { display: flex; gap: 8px; align-items: center; }
        
        select, button {
            padding: 8px 10px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        select { border: 2px solid #d3d6da; background-color: white; color: #1a1a1b; }
        
        #hint-btn { background-color: #c9b458; color: white; border: none; }
        #hint-btn:disabled { background-color: #d3d6da; cursor: not-allowed; }
        #restart-btn { background-color: #787c7e; color: white; border: none; }

        #message {
            min-height: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d71111;
            text-align: center;
            line-height: 1.4;
            word-break: break-word;
        }
        
        #board-wrapper {
            width: 100%; display: flex; justify-content: center; margin-bottom: 20px;
        }
        #board { display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .row { display: flex; gap: 5px; justify-content: center; }
        .tile {
            width: var(--tile-size); height: var(--tile-size);
            border: 2px solid #d3d6da; display: inline-flex; justify-content: center;
            align-items: center; font-size: calc(var(--tile-size) * 0.6); font-weight: bold; text-transform: uppercase;
            transition: border-color 0.2s; /* 让边框颜色变化更平滑 */
        }
        .filled { border-color: #878a8c; }

        /* --- 新增：抖动动画与错误边框样式 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s;
        }
        .shake .tile {
            border-color: #d71111 !important; /* 抖动时边框变红 */
        }
        /* ---------------------------------- */

        #keyboard {
            width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 8px;
        }
        .keyboard-row { display: flex; justify-content: center; gap: 6px; }
        .key {
            font-family: inherit; font-weight: bold; font-size: 1.2rem;
            border: 0; padding: 0; height: 58px; border-radius: 4px;
            cursor: pointer; background-color: #d3d6da; color: #1a1a1b; flex: 1;
            display: flex; justify-content: center; align-items: center; text-transform: uppercase;
        }
        .key.wide { flex: 1.5; font-size: 1rem; }

        .correct { background-color: #6aaa64 !important; color: white !important; border-color: #6aaa64 !important; }
        .present { background-color: #c9b458 !important; color: white !important; border-color: #c9b458 !important; }
        .absent { background-color: #787c7e !important; color: white !important; border-color: #787c7e !important; }
    </style>
</head>
<body>

    <!-- 教程弹窗 -->
    <div id="tutorial-overlay">
        <div id="tutorial-modal">
            <h2>Wordle 规则</h2>
            <p style="font-size: 14px;">在 <strong>6次</strong> 机会内猜出目标单词。</p>
            <div class="tutorial-example">
                <div class="tutorial-tile correct">W</div>
                <span>字母存在，且<strong>位置正确</strong></span>
            </div>
            <div class="tutorial-example">
                <div class="tutorial-tile present">O</div>
                <span>字母存在，但<strong>位置不对</strong></span>
            </div>
            <div class="tutorial-example">
                <div class="tutorial-tile absent">R</div>
                <span>单词中<strong>不包含</strong>此字母</span>
            </div>
            <button id="start-game-btn">开始游戏</button>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="header-container">
        <h1>WORDLE</h1>
        <div class="controls">
            <select id="mode-select" onchange="changeMode(this.value)">
                <option value="3">3字母</option>
                <option value="4">4字母</option>
                <option value="5" selected>5字母</option>
                <option value="6">6字母</option>
                <option value="7">7字母</option>
            </select>
            <button id="hint-btn">提示</button>
            <button id="restart-btn">重来</button>
        </div>
    </div>
    
    <div id="message">正在加载游戏...</div>
    <div id="board-wrapper"><div id="board"></div></div>
    <div id="keyboard"></div>

    <script>
        const ROW_COUNT = 6;
        let COL_COUNT = 5; 
        let wordListData = []; 
        let dictionary = [];   
        let currentTarget = null; 
        
        let currentRow = 0;
        let currentCol = 0;
        let isGameOver = false;

        let hintUsed = false;
        let discoveredLetters = new Set();
        let tutorialOpen = true;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");
        const hintBtn = document.getElementById("hint-btn");
        const restartBtn = document.getElementById("restart-btn");
        const tutorialOverlay = document.getElementById("tutorial-overlay");
        const startGameBtn = document.getElementById("start-game-btn");

        const keyboardRows = [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['Enter', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'Backspace']
        ];

        startGameBtn.addEventListener("click", () => {
            tutorialOverlay.style.display = 'none';
            tutorialOpen = false;
        });

        hintBtn.addEventListener("click", useHint);
        restartBtn.addEventListener("click", restartGame);

        function initBoard() {
            board.innerHTML = ""; 
            for (let r = 0; r < ROW_COUNT; r++) {
                let row = document.createElement("div");
                row.className = "row";
                row.id = `row-${r}`;
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keyboard.innerHTML = ""; 
            keyboardRows.forEach(row => {
                let rowEl = document.createElement("div");
                rowEl.className = "keyboard-row";
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.className = "key";
                    button.id = `key-${key}`;
                    if (key === "Enter") {
                        button.innerText = "ENTER"; button.classList.add("wide");
                    } else if (key === "Backspace") {
                        button.innerText = "⌫"; button.classList.add("wide");
                    } else {
                        button.innerText = key;
                    }
                    button.addEventListener("click", () => handleVirtualKeyClick(key));
                    rowEl.appendChild(button);
                });
                keyboard.appendChild(rowEl);
            });
        }

        function showMessage(msg, duration = 2000, color = "#d71111") {
            messageEl.innerText = msg;
            messageEl.style.color = color;
            if (duration > 0) {
                setTimeout(() => {
                    if (messageEl.innerText === msg) messageEl.innerText = "";
                }, duration);
            }
        }

        // 新增：行抖动动画辅助函数
        function shakeCurrentRow() {
            const currentRowEl = document.getElementById(`row-${currentRow}`);
            if (currentRowEl) {
                currentRowEl.classList.add("shake");
                // 动画时间为0.4秒，结束后移除类以便下次能再次触发
                setTimeout(() => {
                    currentRowEl.classList.remove("shake");
                }, 400); 
            }
        }

        function changeMode(modeStr) {
            COL_COUNT = parseInt(modeStr);
            document.documentElement.style.setProperty('--col-count', COL_COUNT);
            loadDictionary(); 
        }

        function restartGame() {
            if (wordListData.length === 0) return;
            currentRow = 0; currentCol = 0; isGameOver = false;

            hintUsed = false; discoveredLetters.clear();
            hintBtn.disabled = false; hintBtn.innerText = "提示";

            currentTarget = wordListData[Math.floor(Math.random() * wordListData.length)];
            console.log(`${COL_COUNT}字母模式答案:`, currentTarget.original);

            messageEl.innerText = "";
            for (let r = 0; r < ROW_COUNT; r++) {
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.getElementById(`tile-${r}-${c}`);
                    tile.innerText = ""; tile.className = "tile"; 
                }
            }
            document.querySelectorAll(".key").forEach(k => k.classList.remove("correct", "present", "absent"));
        }

        function useHint() {
            if (isGameOver || hintUsed || !currentTarget || tutorialOpen) return;
            let targetLetters = new Set(currentTarget.lower.split(''));
            let undiscovered = [...targetLetters].filter(l => !discoveredLetters.has(l));

            if (undiscovered.length === 0) {
                showMessage("所有字母都已被发现！", 2000, "#c9b458"); return; 
            }

            let hintLetter = undiscovered[Math.floor(Math.random() * undiscovered.length)];
            hintUsed = true; hintBtn.disabled = true; hintBtn.innerText = "已提示";
            
            const keyBtn = document.getElementById(`key-${hintLetter}`);
            if (keyBtn && !keyBtn.classList.contains('correct')) {
                keyBtn.classList.add('present');
            }
            showMessage(`💡 提示：包含字母 [ ${hintLetter.toUpperCase()} ]`, 4000, "#c9b458");
        }

        function handleVirtualKeyClick(key) {
            if (isGameOver || tutorialOpen) return;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else addLetter(key);
        }

        function handlePhysicalInput(e) {
            if (isGameOver || tutorialOpen) return;
            const key = e.key;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else if (/^[a-zA-Z]$/.test(key)) addLetter(key.toLowerCase());
        }

        function addLetter(letter) {
            if (currentCol < COL_COUNT) {
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = letter; tile.classList.add("filled");
                currentCol++;
            }
        }

        function deleteLetter() {
            if (currentCol > 0) {
                currentCol--;
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = ""; tile.classList.remove("filled");
            }
        }

        function submitGuess() {
            // 如果字母没填满，抖动并提示
            if (currentCol !== COL_COUNT) { 
                shakeCurrentRow();
                showMessage("字母数量不足"); 
                return; 
            }
            
            let guess = "";
            for (let c = 0; c < COL_COUNT; c++) {
                guess += document.getElementById(`tile-${currentRow}-${c}`).innerText.toLowerCase();
            }
            
            // 如果单词不在词库中，抖动并提示
            if (!dictionary.includes(guess)) { 
                shakeCurrentRow();
                showMessage("不在单词列表中"); 
                return; 
            }

            let targetLetterCount = {};
            for (let i = 0; i < COL_COUNT; i++) {
                let letter = currentTarget.lower[i];
                targetLetterCount[letter] = (targetLetterCount[letter] || 0) + 1;
            }

            let tileStatuses = new Array(COL_COUNT).fill("absent");
            for (let i = 0; i < COL_COUNT; i++) {
                if (guess[i] === currentTarget.lower[i]) {
                    tileStatuses[i] = "correct"; targetLetterCount[guess[i]] -= 1;
                }
            }
            for (let i = 0; i < COL_COUNT; i++) {
                if (tileStatuses[i] === "absent" && targetLetterCount[guess[i]] > 0) {
                    tileStatuses[i] = "present"; targetLetterCount[guess[i]] -= 1;
                }
            }

            for (let i = 0; i < COL_COUNT; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                let letter = guess[i]; let status = tileStatuses[i];
                if (status === "correct" || status === "present") discoveredLetters.add(letter);
                tile.classList.add(status);
                
                const keyBtn = document.getElementById(`key-${letter}`);
                if (keyBtn && !keyBtn.classList.contains('correct')) {
                    if (!(keyBtn.classList.contains('present') && status === 'absent')) {
                        keyBtn.classList.remove('absent', 'present', 'correct');
                        keyBtn.classList.add(status);
                    }
                }
            }

            const answerDisplay = currentTarget.def ? `${currentTarget.original}\n${currentTarget.def}` : `${currentTarget.original}`;
            if (guess === currentTarget.lower) {
                showMessage(`恭喜你，猜对了！\n${answerDisplay}`, 0, "#6aaa64");
                isGameOver = true; return;
            }

            currentRow++; currentCol = 0;
            if (currentRow === ROW_COUNT) {
                showMessage(`结束！答案:\n${answerDisplay}`, 0);
                isGameOver = true;
            }
        }

        function loadDictionary() {
            showMessage(`加载 ${COL_COUNT} 字母词库中...`, 0);
            const fileName = `${COL_COUNT}.wordle`; 
            
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP状态: ${response.status}`);
                    return response.text();
                })
                .then(text => {
                    wordListData = []; dictionary = [];
                    const lines = text.split(/\r?\n/);
                    lines.forEach(line => {
                        line = line.trim();
                        if (!line) return;
                        const match = line.match(/^([a-zA-Z]+)(?:\s+(.*))?$/);
                        if (match) {
                            const oWord = match[1];
                            const def = match[2] ? match[2].trim() : "";
                            if (oWord.length === COL_COUNT) {
                                const lWord = oWord.toLowerCase();
                                wordListData.push({ original: oWord, lower: lWord, def: def });
                                dictionary.push(lWord);
                            }
                        }
                    });
                    if (wordListData.length === 0) throw new Error(`文件空或无符合长度单词`);
                    initBoard(); initKeyboard(); restartGame(); messageEl.innerText = "";
                })
                .catch(error => {
                    showMessage(`加载词库失败：${fileName}\n错误：${error.message}`, 0);
                    initBoard(); initKeyboard();
                });
        }

        document.addEventListener("keydown", handlePhysicalInput);
        loadDictionary();
    </script>
</body>
</html>
