<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle 游戏</title>
    <style>
        :root {
            var(--tile-size: min(60px, calc(20vw - 12px)));
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            color: #1a1a1b;
            margin: 0;
            padding: 10px;
        }
        
        #header-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #d3d6da;
            padding-bottom: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select, button {
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        select {
            border: 2px solid #d3d6da;
            background-color: white;
            color: #1a1a1b;
        }
        #restart-btn {
            background-color: #787c7e;
            color: white;
            border: none;
            transition: background-color 0.2s;
        }
        #restart-btn:hover {
            background-color: #565758;
        }

        /* 修改了 message 的样式以支持多行文本（因为释义可能很长） */
        #message {
            min-height: 20px;
            height: auto;
            font-weight: bold;
            margin-bottom: 15px;
            color: #d71111;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
            word-break: break-word;
        }
        
        #board-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .tile {
            width: min(60px, calc(20vw - 12px));
            height: min(60px, calc(20vw - 12px));
            border: 2px solid #d3d6da;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .filled {
            border-color: #878a8c;
        }

        #keyboard {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .key {
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            border: 0;
            padding: 0;
            height: 58px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            background-color: #d3d6da;
            color: #1a1a1b;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            transition: background-color 0.1s;
        }
        .key:active {
            transform: scale(0.95);
        }
        .key.wide {
            flex: 1.5;
            font-size: 1rem;
        }

        .correct { background-color: #6aaa64 !important; color: white !important; border-color: #6aaa64 !important; }
        .present { background-color: #c9b458 !important; color: white !important; border-color: #c9b458 !important; }
        .absent { background-color: #787c7e !important; color: white !important; border-color: #787c7e !important; }
    </style>
</head>
<body>

    <div id="header-container">
        <h1>WORDLE</h1>
        <div class="controls">
            <select id="mode-select" onchange="changeMode(this.value)">
                <option value="3">3 字母</option>
                <option value="4">4 字母</option>
                <option value="5" selected>5 字母</option>
                <option value="6">6 字母</option>
                <option value="7">7 字母</option>
            </select>
            <button id="restart-btn" onclick="restartGame()">重新开始</button>
        </div>
    </div>
    
    <div id="message">正在加载词库...</div>
    
    <div id="board-wrapper">
        <div id="board"></div>
    </div>
    
    <div id="keyboard"></div>

    <script>
        const ROW_COUNT = 6;
        let COL_COUNT = 5; 
        
        let wordListData = []; // 存储包含对象 {original, lower, def} 的完整列表
        let dictionary = [];   // 仅存储全小写单词，用于快速判断输入是否合法
        let currentTarget = null; // 当前目标单词对象
        
        let currentRow = 0;
        let currentCol = 0;
        let isGameOver = false;

        const board = document.getElementById("board");
        const keyboard = document.getElementById("keyboard");
        const messageEl = document.getElementById("message");

        const keyboardRows = [
            ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
            ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
            ['Enter', 'z', 'x', 'c', 'v', 'b', 'n', 'm', 'Backspace']
        ];

        function initBoard() {
            board.innerHTML = ""; 
            for (let r = 0; r < ROW_COUNT; r++) {
                let row = document.createElement("div");
                row.className = "row";
                row.id = `row-${r}`;
                
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${r}-${c}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keyboard.innerHTML = ""; 
            keyboardRows.forEach(row => {
                let rowEl = document.createElement("div");
                rowEl.className = "keyboard-row";
                row.forEach(key => {
                    let button = document.createElement("button");
                    button.className = "key";
                    button.id = `key-${key}`;
                    
                    if (key === "Enter") {
                        button.innerText = "ENTER";
                        button.classList.add("wide");
                    } else if (key === "Backspace") {
                        button.innerText = "⌫";
                        button.classList.add("wide");
                    } else {
                        button.innerText = key;
                    }

                    button.addEventListener("click", () => handleVirtualKeyClick(key));
                    rowEl.appendChild(button);
                });
                keyboard.appendChild(rowEl);
            });
        }

        function showMessage(msg, duration = 2000) {
            messageEl.innerText = msg;
            messageEl.style.color = "#d71111";
            if (duration > 0) {
                setTimeout(() => {
                    if (messageEl.innerText === msg) messageEl.innerText = "";
                }, duration);
            }
        }

        function changeMode(modeStr) {
            COL_COUNT = parseInt(modeStr);
            loadDictionary(); 
        }

        function restartGame() {
            if (wordListData.length === 0) return;

            currentRow = 0;
            currentCol = 0;
            isGameOver = false;

            // 随机抽取一个单词对象
            currentTarget = wordListData[Math.floor(Math.random() * wordListData.length)];

            console.log(`${COL_COUNT}字母模式，新答案是:`, currentTarget.original);

            messageEl.innerText = "";

            for (let r = 0; r < ROW_COUNT; r++) {
                for (let c = 0; c < COL_COUNT; c++) {
                    let tile = document.getElementById(`tile-${r}-${c}`);
                    tile.innerText = "";
                    tile.className = "tile"; 
                }
            }

            const keys = document.querySelectorAll(".key");
            keys.forEach(key => {
                key.classList.remove("correct", "present", "absent");
            });
        }

        function handleVirtualKeyClick(key) {
            if (isGameOver) return;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else addLetter(key);
        }

        function handlePhysicalInput(e) {
            if (isGameOver) return;
            const key = e.key;
            if (key === "Enter") submitGuess();
            else if (key === "Backspace") deleteLetter();
            else if (/^[a-zA-Z]$/.test(key)) addLetter(key.toLowerCase());
        }

        function addLetter(letter) {
            if (currentCol < COL_COUNT) {
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = letter;
                tile.classList.add("filled");
                currentCol++;
            }
        }

        function deleteLetter() {
            if (currentCol > 0) {
                currentCol--;
                const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
                tile.innerText = "";
                tile.classList.remove("filled");
            }
        }

        function updateKeyboardStatus(letter, status) {
            const keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn) return;

            if (keyBtn.classList.contains('correct')) return;
            if (keyBtn.classList.contains('present') && status === 'absent') return;

            keyBtn.classList.remove('absent', 'present', 'correct');
            keyBtn.classList.add(status);
        }

        function submitGuess() {
            if (currentCol !== COL_COUNT) {
                showMessage("字母数量不足");
                return;
            }

            let guess = "";
            for (let c = 0; c < COL_COUNT; c++) {
                guess += document.getElementById(`tile-${currentRow}-${c}`).innerText.toLowerCase();
            }

            if (!dictionary.includes(guess)) {
                showMessage("不在单词列表中");
                return;
            }

            let targetLetterCount = {};
            for (let i = 0; i < COL_COUNT; i++) {
                let letter = currentTarget.lower[i];
                targetLetterCount[letter] = (targetLetterCount[letter] || 0) + 1;
            }

            let tileStatuses = new Array(COL_COUNT).fill("absent");

            for (let i = 0; i < COL_COUNT; i++) {
                if (guess[i] === currentTarget.lower[i]) {
                    tileStatuses[i] = "correct";
                    targetLetterCount[guess[i]] -= 1;
                }
            }

            for (let i = 0; i < COL_COUNT; i++) {
                if (tileStatuses[i] === "absent" && targetLetterCount[guess[i]] > 0) {
                    tileStatuses[i] = "present";
                    targetLetterCount[guess[i]] -= 1;
                }
            }

            for (let i = 0; i < COL_COUNT; i++) {
                let tile = document.getElementById(`tile-${currentRow}-${i}`);
                let letter = guess[i];
                let status = tileStatuses[i];
                
                tile.classList.add(status);
                updateKeyboardStatus(letter, status); 
            }

            // 格式化输出的答案字符串：保留原大小写和释义（如果文件里没有释义则不显示破折号）
            const answerDisplay = currentTarget.def 
                ? `${currentTarget.original}  ——  ${currentTarget.def}`
                : `${currentTarget.original}`;

            if (guess === currentTarget.lower) {
                // 猜对了，显示绿字 + 答案及释义
                showMessage(`恭喜你，猜对了！\n${answerDisplay}`, 0);
                messageEl.style.color = "#6aaa64";
                isGameOver = true;
                return;
            }

            currentRow++;
            currentCol = 0;

            if (currentRow === ROW_COUNT) {
                // 猜错了，显示红字 + 答案及释义
                showMessage(`游戏结束！答案是:\n${answerDisplay}`, 0);
                isGameOver = true;
            }
        }

        function loadDictionary() {
            showMessage(`正在加载 ${COL_COUNT} 字母词库...`, 0);
            const fileName = `${COL_COUNT}.wordle`; 
            
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error(`无法读取文件: ${fileName}`);
                    return response.text();
                })
                .then(text => {
                    wordListData = [];
                    dictionary = [];

                    // 按行分割文件
                    const lines = text.split(/\r?\n/);
                    
                    lines.forEach(line => {
                        line = line.trim();
                        if (!line) return;

                        // 使用正   匹配：提取开头的英文字母为单词，后面的所有内容为释义
                        // 兼容制表符(\t)和空格分隔
                        const match = line.match(/^([a-zA-Z]+)(?:\s+(.*))?$/);
                        
                        if (match) {
                            const originalWord = match[1];
                            const definition = match[2] ? match[2].trim() : "";
                            
                            // 仅保存长度符合当前模式的单词
                            if (originalWord.length === COL_COUNT) {
                                const lowerWord = originalWord.toLowerCase();
                                wordListData.push({
                                    original: originalWord,
                                    lower: lowerWord,
                                    def: definition
                                });
                                dictionary.push(lowerWord);
                            }
                        }
                    });
                    
                    if (wordListData.length === 0) {
                        throw new Error(`${fileName} 为空或没有找到长度为 ${COL_COUNT} 的单词`);
                    }
                    
                    initBoard();
                    initKeyboard();
                    restartGame(); 
                    
                    messageEl.innerText = "";
                })
                .catch(error => {
                    showMessage(`加载失败：请检查是否存在 ${fileName} 文件！`);
                    console.error(error);
                    
                    initBoard(); 
                    initKeyboard();
                    wordListData = [];
                    dictionary = [];
                });
        }

        document.addEventListener("keydown", handlePhysicalInput);
        loadDictionary();
    </script>
</body>
</html>
